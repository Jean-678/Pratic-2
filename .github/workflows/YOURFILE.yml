name: Your Workflow
on: [push]

jobs:                           # ✅ REQUIRED - jobs section
  test-secret:                  # ✅ REQUIRED - job name (you choose this)
    runs-on: ubuntu-latest      # ✅ REQUIRED - specify runner
    steps:                      # ✅ NOW steps is in the right place
      - uses: actions/checkout@v4
      
      - name: Verify Secret
        run: |
          if [ -z "$CI_SECRET_MESSAGE" ]; then
            echo "Secret missing"
            exit 1
          else
            echo "GitHub Secret detected"
          fi
        env:
          CI_SECRET_MESSAGE: ${{ secrets.CI_SECRET_MESSAGE }}
